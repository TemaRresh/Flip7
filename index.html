<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#101828">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flip 7">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Flip 7 Score</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #151d31;
      --panel-2: #1c2740;
      --text: #f7f8fb;
      --muted: #9ba7bd;
      --accent: #ffb32c;
      --accent-2: #ffca63;
      --danger: #ff6b6b;
      --border: rgba(255,255,255,.09);
      --shadow: 0 18px 50px rgba(0,0,0,.24);
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% -10%, rgba(255,179,44,.18), transparent 38%),
        linear-gradient(180deg, #11182a 0%, var(--bg) 56%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    button, input, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: linear-gradient(145deg, var(--accent-2), var(--accent));
      color: #231600;
      font-size: 27px;
      box-shadow: 0 10px 24px rgba(255,179,44,.22);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -.03em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: 20px;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .player {
      position: relative;
      overflow: hidden;
      min-height: 142px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(160deg, rgba(255,255,255,.07), rgba(255,255,255,.025));
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .player.leader {
      border-color: rgba(255,179,44,.5);
      background: linear-gradient(160deg, rgba(255,179,44,.18), rgba(255,255,255,.035));
    }

    .player-name {
      width: 100%;
      border: 0;
      outline: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
    }

    .player-score {
      font-size: 50px;
      font-weight: 800;
      letter-spacing: -.05em;
      margin-top: 13px;
    }

    .player-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .crown {
      position: absolute;
      right: 14px;
      top: 14px;
      font-size: 22px;
    }

    .primary {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 17px 18px;
      color: #271800;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(255,179,44,.2);
    }

    .primary:active { transform: scale(.99); }

    .section {
      margin-top: 24px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section h2 {
      margin: 0;
      font-size: 18px;
    }

    .round-list {
      display: grid;
      gap: 9px;
    }

    .round {
      display: grid;
      grid-template-columns: 70px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      padding: 12px;
    }

    .round-title {
      color: var(--muted);
      font-size: 13px;
    }

    .round-values {
      display: grid;
      grid-template-columns: repeat(var(--count), minmax(0, 1fr));
      gap: 6px;
    }

    .round-value {
      text-align: center;
      font-weight: 750;
    }

    .small-btn {
      border: 0;
      border-radius: 11px;
      background: rgba(255,255,255,.07);
      color: var(--text);
      padding: 8px 10px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px 16px;
      border: 1px dashed var(--border);
      border-radius: 18px;
    }

    dialog {
      width: min(560px, calc(100% - 24px));
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      background: #151d31;
      box-shadow: 0 28px 80px rgba(0,0,0,.5);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(3,7,18,.72);
      backdrop-filter: blur(7px);
    }

    .modal {
      padding: 20px;
    }

    .modal h3 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    .score-fields {
      display: grid;
      gap: 10px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr 120px;
      align-items: center;
      gap: 12px;
    }

    .score-row label {
      font-weight: 700;
    }

    .score-row input,
    .settings-row input,
    .settings-row select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 12px;
      font-size: 18px;
      outline: none;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .secondary, .danger {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 700;
    }

    .danger { color: var(--danger); }

    .settings-row {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    .settings-row label {
      color: var(--muted);
      font-size: 13px;
    }

    .winner {
      margin: 14px 0;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,179,44,.13);
      border: 1px solid rgba(255,179,44,.35);
      text-align: center;
    }

    .winner strong {
      display: block;
      font-size: 26px;
      margin-top: 5px;
    }

    @media (max-width: 430px) {
      .app { padding-left: 12px; padding-right: 12px; }
      h1 { font-size: 25px; }
      .players { gap: 9px; }
      .player { min-height: 132px; padding: 14px; }
      .player-score { font-size: 44px; }
      .score-row { grid-template-columns: 1fr 105px; }
      .round { grid-template-columns: 54px 1fr auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">7</div>
        <div>
          <h1>Flip 7 Score</h1>
          <div class="subtitle" id="gameStatus">Новая партия</div>
        </div>
      </div>
      <button class="icon-btn" id="settingsBtn" type="button" aria-label="Настройки">⚙️</button>
    </header>

    <section class="players" id="players"></section>

    <button class="primary" id="addRoundBtn" type="button">＋ Добавить раунд</button>

    <section class="section">
      <div class="section-head">
        <h2>Раунды</h2>
        <span class="subtitle" id="roundCount">0 раундов</span>
      </div>
      <div class="round-list" id="roundList"></div>
    </section>
  </main>

  <dialog id="roundDialog">
    <div class="modal">
      <h3 id="roundDialogTitle">Новый раунд</h3>
      <div class="score-fields" id="scoreFields"></div>
      <div class="modal-actions">
        <button class="secondary" id="cancelRoundBtn" type="button">Отмена</button>
        <button class="primary" id="saveRoundBtn" type="button">Сохранить</button>
      </div>
    </div>
  </dialog>

  <dialog id="settingsDialog">
    <div class="modal">
      <h3>Настройки</h3>
      <div class="settings-row">
        <label for="playerCount">Количество игроков</label>
        <select id="playerCount">
          <option value="3">3 игрока</option>
          <option value="4">4 игрока</option>
        </select>
      </div>
      <div class="settings-row">
        <label for="targetScore">Победа при</label>
        <input id="targetScore" type="number" inputmode="numeric" min="1" value="200">
      </div>
      <div class="modal-actions">
        <button class="danger" id="newGameBtn" type="button">Новая партия</button>
        <button class="primary" id="closeSettingsBtn" type="button">Готово</button>
      </div>
    </div>
  </dialog>

  <dialog id="winnerDialog">
    <div class="modal">
      <div class="winner">
        🎉 Победитель
        <strong id="winnerName"></strong>
        <span id="winnerScore"></span>
      </div>
      <button class="primary" id="winnerCloseBtn" type="button">Продолжить</button>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "flip7-score-v2";

    const defaultState = () => ({
      target: 200,
      players: [
        { name: "Артём" },
        { name: "Маша" },
        { name: "Роберт" },
        { name: "Агата" }
      ],
      rounds: []
    });

    let state;
    let editingRound = null;

    try {
      state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState();
    } catch {
      state = defaultState();
    }

    const $ = id => document.getElementById(id);

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function totals() {
      return state.players.map((_, playerIndex) =>
        state.rounds.reduce((sum, round) => sum + Number(round[playerIndex] || 0), 0)
      );
    }

    function pluralRounds(n) {
      if (n % 10 === 1 && n % 100 !== 11) return `${n} раунд`;
      if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return `${n} раунда`;
      return `${n} раундов`;
    }

    function render() {
      const sums = totals();
      const max = Math.max(...sums);
      const leaderIndex = sums.indexOf(max);

      $("players").innerHTML = state.players.map((player, index) => `
        <article class="player ${max > 0 && index === leaderIndex ? "leader" : ""}">
          ${max > 0 && index === leaderIndex ? '<div class="crown">👑</div>' : ""}
          <input class="player-name" data-player="${index}" value="${escapeHtml(player.name)}" aria-label="Имя игрока ${index + 1}">
          <div class="player-score">${sums[index]}</div>
          <div class="player-meta">${state.rounds.length ? `за ${pluralRounds(state.rounds.length)}` : "пока без очков"}</div>
        </article>
      `).join("");

      document.querySelectorAll(".player-name").forEach(input => {
        input.addEventListener("change", event => {
          const index = Number(event.target.dataset.player);
          state.players[index].name = event.target.value.trim() || `Игрок ${index + 1}`;
          save();
          render();
        });
      });

      $("roundCount").textContent = pluralRounds(state.rounds.length);
      $("gameStatus").textContent = state.rounds.length
        ? `Игра до ${state.target}, раунд ${state.rounds.length + 1}`
        : `Игра до ${state.target}`;

      if (!state.rounds.length) {
        $("roundList").innerHTML = '<div class="empty">Добавь первый раунд, и здесь появится история.</div>';
      } else {
        $("roundList").innerHTML = state.rounds.map((round, roundIndex) => `
          <div class="round">
            <div class="round-title">Раунд ${roundIndex + 1}</div>
            <div class="round-values" style="--count:${state.players.length}">
              ${round.map(value => `<div class="round-value">${value}</div>`).join("")}
            </div>
            <button class="small-btn edit-round" data-round="${roundIndex}" type="button" aria-label="Изменить раунд ${roundIndex + 1}">✏️</button>
          </div>
        `).join("");

        document.querySelectorAll(".edit-round").forEach(button => {
          button.addEventListener("click", () => openRound(Number(button.dataset.round)));
        });
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function openRound(roundIndex = null) {
      editingRound = roundIndex;
      $("roundDialogTitle").textContent = roundIndex === null ? "Новый раунд" : `Раунд ${roundIndex + 1}`;

      $("scoreFields").innerHTML = state.players.map((player, index) => {
        const value = roundIndex === null ? "" : state.rounds[roundIndex][index];
        return `
          <div class="score-row">
            <label for="score-${index}">${escapeHtml(player.name)}</label>
            <input id="score-${index}" class="score-input" type="number" inputmode="numeric" value="${value}" placeholder="0">
          </div>
        `;
      }).join("");

      $("roundDialog").showModal();
      setTimeout(() => document.querySelector(".score-input")?.focus(), 50);
    }

    function saveRound() {
      const values = [...document.querySelectorAll(".score-input")].map(input => Number(input.value || 0));
      if (editingRound === null) state.rounds.push(values);
      else state.rounds[editingRound] = values;

      save();
      $("roundDialog").close();
      render();
      checkWinner();
    }

    function checkWinner() {
      const sums = totals();
      const best = Math.max(...sums);
      if (best < state.target) return;

      const index = sums.indexOf(best);
      $("winnerName").textContent = state.players[index].name;
      $("winnerScore").textContent = `${best} очков`;
      $("winnerDialog").showModal();
    }

    function applyPlayerCount(count) {
      while (state.players.length < count) {
        state.players.push({ name: `Игрок ${state.players.length + 1}` });
      }
      state.players = state.players.slice(0, count);
      state.rounds = state.rounds.map(round => {
        const next = round.slice(0, count);
        while (next.length < count) next.push(0);
        return next;
      });
    }

    $("addRoundBtn").addEventListener("click", () => openRound());
    $("cancelRoundBtn").addEventListener("click", () => $("roundDialog").close());
    $("saveRoundBtn").addEventListener("click", saveRound);

    $("settingsBtn").addEventListener("click", () => {
      $("playerCount").value = String(state.players.length);
      $("targetScore").value = String(state.target);
      $("settingsDialog").showModal();
    });

    $("closeSettingsBtn").addEventListener("click", () => {
      applyPlayerCount(Number($("playerCount").value));
      state.target = Math.max(1, Number($("targetScore").value || 200));
      save();
      $("settingsDialog").close();
      render();
    });

    $("newGameBtn").addEventListener("click", () => {
      if (!confirm("Удалить все раунды и начать новую партию?")) return;
      state.rounds = [];
      save();
      $("settingsDialog").close();
      render();
    });

    $("winnerCloseBtn").addEventListener("click", () => $("winnerDialog").close());

    render();

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
